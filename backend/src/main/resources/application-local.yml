spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/depgraph
    username: depgraph
    password: depgraph

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    com.depgraph: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
